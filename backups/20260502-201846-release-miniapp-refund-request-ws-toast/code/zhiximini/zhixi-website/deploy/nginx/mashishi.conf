server {
    listen 80;
    server_name mashishi.com www.mashishi.com admin.mashishi.com api.mashishi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mashishi.com www.mashishi.com;

    ssl_certificate /etc/nginx/ssl/mashishi.com.crt;
    ssl_certificate_key /etc/nginx/ssl/mashishi.com.key;

    root /home/ubuntu/zhixi/current/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.mashishi.com;

    ssl_certificate /etc/nginx/ssl/admin.mashishi.com.crt;
    ssl_certificate_key /etc/nginx/ssl/admin.mashishi.com.key;

    root /home/ubuntu/zhixi/current/admin-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name api.mashishi.com;

    ssl_certificate /etc/nginx/ssl/api.mashishi.com.crt;
    ssl_certificate_key /etc/nginx/ssl/api.mashishi.com.key;

    location /ws/ {
        proxy_pass http://127.0.0.1:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
